model_list:
  - model_name: "groq-model"
    litellm_params:
      model: "groq/llama-3.3-70b-versatile"
      api_key: "os.environ/GROQ_API_KEY"

# In LiteLLM v1.88, guardrails are defined at the root as a list
guardrails:
  - guardrail_name: "llama_guard"
    litellm_params:
      guardrail: "llama_guard"
      mode: "pre_call"
      # Groq hosts llama-guard-3-8b, so we can point it there!
      api_base: "https://api.groq.com/openai/v1"
      api_key: "os.environ/GROQ_API_KEY"
      model: "llama-guard-3-8b"
